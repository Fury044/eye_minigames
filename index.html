<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ay-eye Minigames - Preview</title>
    <style>
        /* Ay-eye Minigames — shared stylesheet */

        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Azeret+Mono:wght@400;500;700&display=swap');

        :root {
            --accent: #00e0b8;
            --danger: #ff3b5c;
            --success: #39d98a;
            --bg: #0a0e14;
            --panel: rgba(14, 19, 28, 0.92);
            --line: rgba(255, 255, 255, 0.08);
            --text: #e8edf2;
            --muted: #6b7686;
            --display: 'Chakra Petch', sans-serif;
            --mono: 'Azeret Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: var(--mono);
            color: var(--text);
            user-select: none;
        }

        .hidden {
            display: none !important;
        }

        #root {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
        }

        #stage {
            position: relative;
            z-index: 1;
            width: 560px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.4),
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 60px -20px var(--accent);
            overflow: hidden;
            animation: panel-in 0.28s cubic-bezier(0.2, 0.9, 0.2, 1) both;
        }

        @keyframes panel-in {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ---------------- HUD ---------------- */
        #hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
        }

        #hud-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #hud-tag {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        #hud-name {
            font-family: var(--display);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        #hud-timer {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #timer-bar {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent), #fff);
            transition: width 0.1s linear;
        }

        #timer-text {
            font-variant-numeric: tabular-nums;
            font-size: 13px;
            color: var(--muted);
            min-width: 34px;
            text-align: right;
        }

        /* ---------------- Board ---------------- */
        #board {
            position: relative;
            min-height: 320px;
            padding: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #board canvas {
            display: block;
        }

        /* ---------------- Footer ---------------- */
        #footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            border-top: 1px solid var(--line);
            min-height: 44px;
        }

        #dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .dot.done {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .dot.fail {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .dot.active {
            background: var(--accent);
            transform: scale(1.3);
        }

        #hint {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* ---------------- Flash overlay ---------------- */
        #flash {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: grid;
            place-items: center;
            pointer-events: none;
            background: transparent;
        }

        #flash-text {
            font-family: var(--display);
            font-weight: 700;
            font-size: 48px;
            letter-spacing: 6px;
            text-transform: uppercase;
            padding: 14px 36px;
            border-radius: 12px;
            background: rgba(10, 14, 20, 0.82);
            animation: flash-pop 0.4s cubic-bezier(0.2, 0.9, 0.2, 1) both;
        }

        #flash.win #flash-text {
            color: var(--success);
            text-shadow: 0 0 30px var(--success);
        }

        #flash.lose #flash-text {
            color: var(--danger);
            text-shadow: 0 0 30px var(--danger);
        }

        @keyframes flash-pop {
            from {
                opacity: 0;
                transform: scale(0.6);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ---------------- Reusable bits for games ---------------- */
        .btn {
            font-family: var(--display);
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            border-color: var(--accent);
            background: rgba(0, 224, 184, 0.08);
        }

        .btn.danger:hover {
            border-color: var(--danger);
            background: rgba(255, 59, 92, 0.08);
        }

        .label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-7px);
            }

            75% {
                transform: translateX(7px);
            }
        }

        .glow-accent {
            color: var(--accent);
        }

        .glow-success {
            color: var(--success);
        }

        .glow-danger {
            color: var(--danger);
        }

        body {
            background: #05080d;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="root" class="hidden">
        <div id="stage">
            <header id="hud">
                <div id="hud-title"><span id="hud-tag"></span><span id="hud-name"></span></div>
                <div id="hud-timer">
                    <div id="timer-bar">
                        <div id="timer-fill"></div>
                    </div><span id="timer-text">0.0</span>
                </div>
            </header>
            <main id="board"></main>
            <footer id="footer">
                <div id="dots"></div>
                <div id="hint"></div>
            </footer>
        </div>
        <div id="flash" class="hidden"><span id="flash-text"></span></div>
    </div>
    <script>const SFX = (function () {
            let ctx = null;
            let enabled = true;
            let master = 0.5;

            function ac() {
                if (!ctx) {
                    try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
                    catch (e) { enabled = false; }
                }
                if (ctx && ctx.state === 'suspended') ctx.resume();
                return ctx;
            }

            function tone(freq, dur, type, vol, slideTo, delay) {
                if (!enabled) return;
                const a = ac(); if (!a) return;
                const t0 = a.currentTime + (delay || 0);
                const osc = a.createOscillator();
                const gain = a.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, t0);
                if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
                const v = (vol == null ? 0.3 : vol) * master;
                gain.gain.setValueAtTime(0.0001, t0);
                gain.gain.exponentialRampToValueAtTime(v, t0 + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
                osc.connect(gain); gain.connect(a.destination);
                osc.start(t0); osc.stop(t0 + dur + 0.02);
            }

            function noise(dur, vol, filterFreq) {
                if (!enabled) return;
                const a = ac(); if (!a) return;
                const t0 = a.currentTime;
                const len = Math.floor(a.sampleRate * dur);
                const buf = a.createBuffer(1, len, a.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
                const src = a.createBufferSource(); src.buffer = buf;
                const filt = a.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = filterFreq || 1200;
                const gain = a.createGain(); gain.gain.value = (vol == null ? 0.2 : vol) * master;
                src.connect(filt); filt.connect(gain); gain.connect(a.destination);
                src.start(t0);
            }

            const lib = {
                click: () => tone(520, 0.05, 'square', 0.16),
                tick: () => tone(880, 0.03, 'square', 0.10),
                select: () => tone(660, 0.06, 'triangle', 0.18),
                step: () => { tone(700, 0.07, 'sine', 0.2); },
                good: () => { tone(740, 0.08, 'sine', 0.22); tone(990, 0.1, 'sine', 0.18, null, 0.06); },
                bad: () => { tone(200, 0.18, 'sawtooth', 0.22, 90); },
                error: () => { tone(160, 0.12, 'square', 0.2, 110); },
                success: () => { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, 'triangle', 0.22, null, i * 0.08)); },
                fail: () => { [330, 247, 165].forEach((f, i) => tone(f, 0.22, 'sawtooth', 0.22, null, i * 0.1)); },
                charge: () => tone(300, 0.25, 'sine', 0.2, 700),
                zap: () => { noise(0.12, 0.18, 2200); tone(900, 0.08, 'square', 0.12, 300); },
                beep: () => tone(1040, 0.05, 'sine', 0.14),
                latch: () => { tone(420, 0.05, 'square', 0.2); tone(620, 0.06, 'square', 0.16, null, 0.04); },
                whoosh: () => noise(0.2, 0.14, 800),
                heartbeat: () => { tone(70, 0.12, 'sine', 0.3); tone(60, 0.1, 'sine', 0.24, null, 0.16); }
            };

            function play(name) {
                if (!enabled) return;
                const fn = lib[name];
                if (fn) try { fn(); } catch (e) { }
            }

            return {
                play,
                setEnabled: (v) => { enabled = !!v; },
                setVolume: (v) => { master = Math.max(0, Math.min(1, v)); },
                isEnabled: () => enabled,
                _lib: lib
            };
        })();

        if (typeof window !== 'undefined') window.SFX = SFX;
    </script>
    <script>const MG = (function () {
            const games = {};
            let current = null;
            let raf = null;
            let timer = null;
            let ended = false;
            let sessionNonce = null;   // per-game token from Lua; required to report a result

            const $ = (id) => document.getElementById(id);

            /* ---- Lua bridge ---- */
            function post(name, body) {
                const url = `https://${resName()}/${name}`;
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                    body: JSON.stringify(body || {})
                }).catch(() => { });
            }
            function resName() {
                return (typeof GetParentResourceName === 'function')
                    ? GetParentResourceName() : 'eye_minigames';
            }

            /* ---- Timer ---- */
            function startTimer(seconds, onExpire) {
                timer = { duration: seconds * 1000, start: performance.now(), onExpire };
                tick();
            }
            function tick() {
                if (!timer) return;
                const elapsed = performance.now() - timer.start;
                const remain = Math.max(0, timer.duration - elapsed);
                const pct = remain / timer.duration;
                $('timer-fill').style.width = (pct * 100) + '%';
                $('timer-text').textContent = (remain / 1000).toFixed(1);
                $('timer-fill').style.background = pct < 0.25
                    ? 'linear-gradient(90deg, var(--danger), #fff)'
                    : 'linear-gradient(90deg, var(--accent), #fff)';
                if (remain <= 0) {
                    const fn = timer.onExpire; timer = null;
                    if (fn) fn();
                    return;
                }
                raf = requestAnimationFrame(tick);
            }
            function stopTimer() {
                if (raf) cancelAnimationFrame(raf);
                raf = null; timer = null;
            }
            function addTime(ms) {
                if (timer) timer.start += ms;
            }

            /* ---- Round dots ---- */
            function setDots(total, states) {
                const c = $('dots'); c.innerHTML = '';
                for (let i = 0; i < total; i++) {
                    const d = document.createElement('div');
                    d.className = 'dot' + (states && states[i] ? ' ' + states[i] : '');
                    c.appendChild(d);
                }
            }

            /* ---- Lifecycle ---- */
            function open(payload) {
                ended = false;
                sessionNonce = payload.nonce || null;
                if (typeof SFX !== 'undefined') {
                    if (payload.sound === false) SFX.setEnabled(false);
                    else SFX.setEnabled(true);
                    if (typeof payload.volume === 'number') SFX.setVolume(payload.volume);
                }
                const game = games[payload.game];
                $('root').classList.remove('hidden');
                $('flash').className = 'hidden';

                const name = game ? game.title : payload.game;
                $('hud-name').textContent = name;
                $('hud-tag').textContent = 'SECURE TASK';
                $('hint').textContent = (game && game.hint) ? game.hint : '';
                $('board').innerHTML = '';
                setDots(0);

                if (!game) { return end(false); }

                const api = {
                    board: $('board'),
                    cfg: payload,
                    startTimer, stopTimer, addTime, setDots,
                    setHint: (t) => { $('hint').textContent = t || ''; },
                    setTag: (t) => { $('hud-tag').textContent = t || ''; },
                    succeed: () => end(true),
                    fail: () => end(false),
                    shake: () => {
                        $('stage').classList.add('shake');
                        if (typeof SFX !== 'undefined') SFX.play('bad');
                        setTimeout(() => $('stage').classList.remove('shake'), 320);
                    },
                    sfx: (name) => { if (typeof SFX !== 'undefined') SFX.play(name); },
                    rand: (a, b) => a + Math.random() * (b - a),
                    randInt: (a, b) => Math.floor(a + Math.random() * (b - a + 1))
                };

                current = game.run(api) || {};
                $('hud-timer').style.visibility = timer ? 'visible' : 'visible';
            }

            function cleanup() {
                stopTimer();
                if (current && typeof current.destroy === 'function') {
                    try { current.destroy(); } catch (e) { }
                }
                current = null;
                document.onkeydown = null;
            }

            function end(success) {
                if (ended) return;
                ended = true;
                cleanup();
                if (typeof SFX !== 'undefined') SFX.play(success ? 'success' : 'fail');

                const flash = $('flash');
                flash.className = success ? 'win' : 'lose';
                $('flash-text').textContent = success ? 'Success' : 'Failed';

                setTimeout(() => {
                    $('root').classList.add('hidden');
                    flash.className = 'hidden';
                    $('board').innerHTML = '';
                    post('result', { success: success, nonce: sessionNonce });
                    sessionNonce = null;
                }, 850);
            }

            /* ---- Global cancel key ---- */
            document.addEventListener('keydown', (e) => {
                if (ended || !current) return;
                if (e.key === 'Escape') {
                    const allow = current.__allowCancel !== false;
                    if (allow) end(false);
                }
            });

            /* ---- Message in from Lua ---- */
            window.addEventListener('message', (ev) => {
                const d = ev.data || {};
                if (d.action === 'open') open(d.payload || {});
            });

            return {
                games,
                register(id, def) { games[id] = def; },
                _internal: { end }
            };
        })();
    </script>
    <script>MG.register('skillcheck', {
            title: 'Skill Check',
            hint: 'SPACE / click when the marker hits the zone',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const need = api.cfg.rounds || (2 + Math.floor(diff / 1.5));
                const W = 300, H = 300, cx = W / 2, cy = H / 2, R = 110;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'pointer';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                const zoneSize = Math.max(0.18, 0.72 - diff * 0.10);
                const speed = 0.022 + diff * 0.016;
                let ang = 0, dir = 1, done = 0, zoneStart = 0, ended = false;

                function newZone() {
                    zoneStart = api.rand(0, Math.PI * 2);
                    dir = Math.random() < 0.5 ? 1 : -1;
                    ang = zoneStart + Math.PI + api.rand(-0.5, 0.5);
                }
                api.setDots(need); newZone();

                function attempt() {
                    if (ended) return;
                    let d = ang - zoneStart;
                    d = ((d % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    if (d <= zoneSize) {
                        done++;
                        api.sfx('latch');
                        api.setDots(need, Array.from({ length: need }, (_, i) => i < done ? 'done' : ''));
                        if (done >= need) { ended = true; api.stopTimer(); cleanup(); setTimeout(() => api.succeed(), 250); }
                        else newZone();
                    } else { ended = true; api.shake(); api.stopTimer(); cleanup(); setTimeout(() => api.fail(), 200); }
                }
                function key(e) { if (e.code === 'Space') { e.preventDefault(); attempt(); } }
                document.addEventListener('keydown', key);
                cvs.addEventListener('click', attempt);
                function cleanup() { document.removeEventListener('keydown', key); }

                api.startTimer(Math.max(7, 18 - diff * 1.6), () => { cleanup(); api.fail(); });

                function draw() {
                    if (!ended) ang += speed * dir;
                    ctx.clearRect(0, 0, W, H);
                    const acc = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8').trim();
                    const suc = (getComputedStyle(document.documentElement).getPropertyValue('--success') || '#39d98a').trim();
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 14;
                    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
                    ctx.strokeStyle = suc; ctx.lineWidth = 14;
                    ctx.shadowColor = suc; ctx.shadowBlur = 14;
                    ctx.beginPath(); ctx.arc(cx, cy, R, zoneStart, zoneStart + zoneSize); ctx.stroke();
                    ctx.shadowBlur = 0;
                    const mx = cx + Math.cos(ang) * R, my = cy + Math.sin(ang) * R;
                    ctx.fillStyle = '#fff'; ctx.shadowColor = acc; ctx.shadowBlur = 12;
                    ctx.beginPath(); ctx.arc(mx, my, 10, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                    ctx.fillStyle = acc; ctx.font = 'bold 30px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText((done) + '/' + need, cx, cy);
                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); cleanup(); } };
            }
        });
    </script>
    <script>MG.register('lockpick', {
            title: 'Lockpick',
            hint: 'Move mouse to rotate · click on the sweet spot',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const pins = 2 + Math.floor(diff / 1.3);
                const tol = Math.max(0.1, 0.32 - diff * 0.04);
                const W = 300, H = 300, cx = W / 2, cy = H / 2, R = 100;

                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'grab';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                const sweetspots = [];
                for (let i = 0; i < pins; i++) sweetspots.push(api.rand(0, Math.PI * 2));
                let pin = 0, pickAng = 0, ended = false;
                api.setDots(pins);

                function rel(e) {
                    const b = cvs.getBoundingClientRect();
                    const x = (e.clientX - b.left) * (cvs.width / b.width) - cx;
                    const y = (e.clientY - b.top) * (cvs.height / b.height) - cy;
                    return Math.atan2(y, x);
                }
                function diffAng(a, b) {
                    let d = Math.abs(((a - b) % (Math.PI * 2)));
                    return Math.min(d, Math.PI * 2 - d);
                }
                cvs.addEventListener('mousemove', (e) => { pickAng = rel(e); });
                cvs.addEventListener('click', () => {
                    if (ended) return;
                    if (diffAng(pickAng, sweetspots[pin]) < tol) {
                        pin++;
                        api.sfx('latch');
                        api.setDots(pins, Array.from({ length: pins }, (_, i) => i < pin ? 'done' : ''));
                        if (pin >= pins) { ended = true; api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                    } else { api.shake(); /* light penalty: lose a sliver of time */ api.addTime(-1500); }
                });

                api.setTag('PICKING');
                api.startTimer(Math.max(10, 22 - diff * 2), () => { if (!ended) api.fail(); });

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    const acc = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8').trim();
                    const suc = (getComputedStyle(document.documentElement).getPropertyValue('--success') || '#39d98a').trim();
                    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(cx, cy, R - 16, 0, Math.PI * 2); ctx.stroke();
                    ctx.fillStyle = '#1a2230'; ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = acc; ctx.lineWidth = 2; ctx.stroke();

                    const prox = 1 - Math.min(1, diffAng(pickAng, sweetspots[pin]) / (Math.PI / 2));
                    const close = diffAng(pickAng, sweetspots[pin]) < tol;
                    ctx.save(); ctx.translate(cx, cy); ctx.rotate(pickAng);
                    ctx.strokeStyle = close ? suc : acc; ctx.lineWidth = 4; ctx.lineCap = 'round';
                    ctx.shadowColor = close ? suc : acc; ctx.shadowBlur = close ? 16 : 6 * prox + 2;
                    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(R + 8, 0); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(R + 8, 0); ctx.lineTo(R - 4, -7); ctx.lineTo(R - 4, 7); ctx.closePath();
                    ctx.fillStyle = close ? suc : acc; ctx.fill();
                    ctx.restore(); ctx.shadowBlur = 0;

                    ctx.fillStyle = close ? suc : 'rgba(255,255,255,0.4)';
                    ctx.font = '12px monospace'; ctx.textAlign = 'center';
                    ctx.fillText(close ? 'CLICK NOW' : (prox > 0.7 ? 'warm…' : 'searching…'), cx, cy + R + 22);

                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); } };
            }
        });
    </script>
    <script>MG.register('keypad', {
            title: 'Keypad',
            hint: '● right spot · ○ right digit, wrong spot',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const len = 3 + Math.floor(diff / 2);
                const attempts = Math.max(4, 8 - diff);
                const code = Array.from({ length: len }, () => api.randInt(0, 9));

                let guess = [], tries = 0, ended = false;

                const box = document.createElement('div');
                box.style.cssText = 'display:flex;gap:28px;align-items:flex-start;';
                box.innerHTML = `
            <div>
              <div class="label">ENTRY</div>
              <div id="entry" style="display:flex;gap:8px;margin-bottom:12px;height:46px;align-items:center;width:184px;"></div>
              <div id="pad" style="display:grid;grid-template-columns:repeat(3,56px);gap:8px;width:184px;"></div>
            </div>
            <div style="min-width:150px;">
              <div class="label">HISTORY (${attempts} tries)</div>
              <div id="hist" style="display:flex;flex-direction:column;gap:6px;font-family:var(--mono);font-size:14px;"></div>
            </div>`;
                api.board.appendChild(box);
                const entryEl = box.querySelector('#entry');
                const padEl = box.querySelector('#pad');
                const histEl = box.querySelector('#hist');

                function renderEntry() {
                    entryEl.innerHTML = '';
                    for (let i = 0; i < len; i++) {
                        const d = document.createElement('div');
                        d.style.cssText = `flex:1;height:46px;border:1px solid var(--line);border-radius:6px;
                    display:grid;place-items:center;font-size:22px;font-family:var(--mono);
                    color:var(--accent);${guess[i] !== undefined ? 'border-color:var(--accent);' : ''}`;
                        d.textContent = guess[i] !== undefined ? guess[i] : '·';
                        entryEl.appendChild(d);
                    }
                }
                const padKeys = [1, 2, 3, 4, 5, 6, 7, 8, 9, '⌫', 0, '✓'];
                padKeys.forEach((k) => {
                    const b = document.createElement('button');
                    b.className = 'btn'; b.textContent = k; b.style.cssText = 'padding:12px 0;font-size:18px;min-width:0;';
                    b.onclick = () => press(k);
                    padEl.appendChild(b);
                });
                function press(k) {
                    if (ended) return;
                    if (k === '⌫') { guess.pop(); renderEntry(); return; }
                    if (k === '✓') { submit(); return; }
                    if (guess.length < len) { guess.push(k); renderEntry(); }
                    api.sfx('click');
                }
                function submit() {
                    if (guess.length < len) { api.shake(); return; }
                    const exact = guess.filter((d, i) => d === code[i]).length;
                    const codeCount = {}, guessCount = {};
                    code.forEach((d, i) => { if (guess[i] !== d) codeCount[d] = (codeCount[d] || 0) + 1; });
                    guess.forEach((d, i) => { if (code[i] !== d) guessCount[d] = (guessCount[d] || 0) + 1; });
                    let partial = 0;
                    Object.keys(guessCount).forEach((d) => { partial += Math.min(guessCount[d], codeCount[d] || 0); });

                    const row = document.createElement('div');
                    row.style.cssText = 'display:flex;justify-content:space-between;gap:10px;padding:4px 8px;border:1px solid var(--line);border-radius:5px;';
                    row.innerHTML = `<span>${guess.join(' ')}</span>
                <span>${'●'.repeat(exact)}<span style="color:var(--muted);">${'○'.repeat(partial)}</span></span>`;
                    histEl.appendChild(row);

                    tries++;
                    if (exact === len) { ended = true; api.stopTimer(); api.setTag('UNLOCKED'); setTimeout(() => api.succeed(), 300); return; }
                    if (tries >= attempts) { ended = true; api.shake(); api.stopTimer(); revealCode(); setTimeout(() => api.fail(), 600); return; }
                    guess = []; renderEntry();
                    api.setTag('TRY ' + (tries + 1) + '/' + attempts);
                }
                function revealCode() {
                    const row = document.createElement('div');
                    row.style.cssText = 'color:var(--danger);font-size:12px;margin-top:4px;';
                    row.textContent = 'CODE: ' + code.join(' ');
                    histEl.appendChild(row);
                }

                api.setTag('TRY 1/' + attempts);
                api.startTimer(Math.max(25, 60 - diff * 5), () => { if (!ended) api.fail(); });
                renderEntry();
                return { destroy() { } };
            }
        });
    </script>
    <script>MG.register('quicktime', {
            title: 'Quicktime',
            hint: 'Press the keys in order, fast',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const len = 4 + diff * 2;
                const perKey = Math.max(0.7, 2.3 - diff * 0.3);
                const KEYS = ['Q', 'W', 'E', 'R', 'A', 'S', 'D', 'F', 'Z', 'X', 'C', 'V'];
                const seq = Array.from({ length: len }, () => KEYS[api.randInt(0, KEYS.length - 1)]);

                let idx = 0, ended = false, keyTimer = null;

                const box = document.createElement('div');
                box.style.cssText = 'display:flex;flex-direction:column;gap:20px;align-items:center;width:480px;';
                box.innerHTML = `
            <div class="label">INPUT SEQUENCE</div>
            <div id="keys" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"></div>
            <div id="kbar" style="width:300px;height:6px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;">
                <div id="kfill" style="height:100%;width:100%;background:var(--accent);"></div>
            </div>`;
                api.board.appendChild(box);
                const keysEl = box.querySelector('#keys');
                const kfill = box.querySelector('#kfill');

                function render() {
                    keysEl.innerHTML = '';
                    seq.forEach((k, i) => {
                        const d = document.createElement('div');
                        const state = i < idx ? 'done' : (i === idx ? 'active' : '');
                        d.style.cssText = `width:42px;height:42px;border-radius:8px;display:grid;place-items:center;
                    font-family:var(--display);font-weight:700;font-size:18px;border:2px solid var(--line);
                    ${state === 'done' ? 'border-color:var(--success);color:var(--success);' : ''}
                    ${state === 'active' ? 'border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px -2px var(--accent);transform:scale(1.12);' : ''}
                    ${state === '' ? 'color:var(--muted);' : ''}`;
                        d.textContent = k;
                        keysEl.appendChild(d);
                    });
                }

                let keyStart = 0, raf = null;
                function startKeyTimer() {
                    keyStart = performance.now();
                    const tick = () => {
                        const el = performance.now() - keyStart;
                        const p = Math.max(0, 1 - el / (perKey * 1000));
                        kfill.style.width = (p * 100) + '%';
                        kfill.style.background = p < 0.3 ? 'var(--danger)' : 'var(--accent)';
                        if (p <= 0) { fail(); return; }
                        raf = requestAnimationFrame(tick);
                    };
                    raf = requestAnimationFrame(tick);
                }
                function stopKeyTimer() { if (raf) cancelAnimationFrame(raf); raf = null; }

                function key(e) {
                    if (ended) return;
                    const k = e.key.toUpperCase();
                    if (!KEYS.includes(k)) return;
                    e.preventDefault();
                    if (k === seq[idx]) {
                        idx++; stopKeyTimer(); render();
                        if (idx >= len) { win(); return; }
                        startKeyTimer();
                    } else { fail(); }
                }
                document.addEventListener('keydown', key);

                function win() { if (ended) return; ended = true; cleanup(); api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                function fail() { if (ended) return; ended = true; api.shake(); cleanup(); api.stopTimer(); setTimeout(() => api.fail(), 200); }
                function cleanup() { stopKeyTimer(); document.removeEventListener('keydown', key); }

                api.setTag('REACT');
                api.startTimer(perKey * len + 2, () => fail());
                render(); startKeyTimer();
                return { destroy() { cleanup(); } };
            }
        });
    </script>
    <script>MG.register('mash', {
            title: 'Mash',
            hint: 'Tap SPACE / click rapidly to fill the bar',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const perPress = 7.5 - diff * 0.7;
                const drainPerSec = 14 + diff * 7;
                const W = 360, H = 220;

                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'pointer';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                let fill = 12, ended = false, pulse = 0, lastT = performance.now();

                function bump() {
                    if (ended) return;
                    fill = Math.min(100, fill + perPress);
                    pulse = 8;
                    api.sfx('tick');
                    if (fill >= 100) finish();
                }
                function key(e) { if (e.code === 'Space') { e.preventDefault(); bump(); } }
                document.addEventListener('keydown', key);
                cvs.addEventListener('mousedown', bump);

                api.setTag('PUSH');
                api.startTimer(Math.max(7, 13 - diff), () => finish());
                function finish() {
                    if (ended) return; ended = true;
                    document.removeEventListener('keydown', key);
                    api.stopTimer();
                    const pass = fill >= 100;
                    setTimeout(() => pass ? api.succeed() : api.fail(), 200);
                }

                function draw() {
                    const now = performance.now();
                    const dt = Math.min(0.05, (now - lastT) / 1000);
                    lastT = now;
                    if (!ended) {
                        fill = Math.max(0, fill - drainPerSec * dt);
                        if (fill >= 100) { finish(); return; }
                    }
                    if (pulse > 0) pulse--;
                    ctx.clearRect(0, 0, W, H);
                    const acc = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8').trim();
                    const suc = (getComputedStyle(document.documentElement).getPropertyValue('--success') || '#39d98a').trim();

                    const bw = W - 80, bh = 40, bx = 40, by = H / 2 - bh / 2;
                    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(bx, by, bw, bh);
                    ctx.fillStyle = fill > 80 ? suc : acc;
                    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10 + pulse;
                    ctx.fillRect(bx, by, bw * (fill / 100), bh);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = suc; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.moveTo(bx + bw, by - 6); ctx.lineTo(bx + bw, by + bh + 6); ctx.stroke(); ctx.setLineDash([]);
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(Math.round(fill) + '%', W / 2, by - 26);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '13px monospace';
                    ctx.fillText('TAP  TAP  TAP', W / 2, by + bh + 30);
                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); document.removeEventListener('keydown', key); } };
            }
        });
    </script>
    <script>MG.register('reaction', {
            title: 'Reaction',
            hint: 'Wait for GREEN, then SPACE / click — don’t jump early',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const rounds = 3;
                const threshold = Math.max(280, 850 - diff * 95);
                const W = 360, H = 240;

                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'pointer';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                let state = 'red', greenAt = 0, round = 0, ended = false, last = 0, waitTO = null;
                api.setDots(rounds);
                scheduleGreen();

                function scheduleGreen() {
                    state = 'red';
                    const delay = api.rand(900, 2600);
                    clearTimeout(waitTO);
                    waitTO = setTimeout(() => { state = 'green'; greenAt = performance.now(); }, delay);
                }
                function tap() {
                    if (ended) return;
                    if (state === 'red') { fail('TOO EARLY'); return; }
                    if (state === 'green') {
                        const rt = performance.now() - greenAt;
                        last = Math.round(rt);
                        if (rt <= threshold) {
                            round++;
                            api.setDots(rounds, Array.from({ length: rounds }, (_, i) => i < round ? 'done' : ''));
                            if (round >= rounds) { win(); return; }
                            if (round >= rounds) { win(); return; } api.sfx('beep');
                            state = 'wait'; setTimeout(scheduleGreen, 500);
                        } else { fail('TOO SLOW ' + last + 'ms'); }
                    }
                }
                function key(e) { if (e.code === 'Space') { e.preventDefault(); tap(); } }
                document.addEventListener('keydown', key);
                cvs.addEventListener('click', tap);

                function win() { if (ended) return; ended = true; cleanup(); api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                function fail(msg) { if (ended) return; ended = true; api.setTag(msg || 'FAIL'); api.shake(); cleanup(); api.stopTimer(); setTimeout(() => api.fail(), 250); }
                function cleanup() { clearTimeout(waitTO); document.removeEventListener('keydown', key); }

                api.startTimer(20, () => fail());

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    const dng = (getComputedStyle(document.documentElement).getPropertyValue('--danger') || '#ff3b5c').trim();
                    const suc = (getComputedStyle(document.documentElement).getPropertyValue('--success') || '#39d98a').trim();
                    let col = state === 'green' ? suc : (state === 'wait' ? 'rgba(255,255,255,0.15)' : dng);
                    ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 30;
                    ctx.beginPath(); ctx.arc(W / 2, H / 2 - 10, 60, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                    ctx.fillStyle = '#0a0e14'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(state === 'green' ? 'GO' : (state === 'wait' ? '…' : 'WAIT'), W / 2, H / 2 - 10);
                    if (last) { ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '13px monospace'; ctx.fillText('last: ' + last + 'ms (need ≤' + threshold + ')', W / 2, H - 24); }
                    if (!ended) loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); cleanup(); } };
            }
        });
    </script>
    <script>MG.register('stacker', {
            title: 'Stacker',
            hint: 'SPACE / click to drop the block on the stack',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const goal = 4 + diff;
                const W = 300, H = 320, blockH = 22;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'pointer';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                let speed = 1.5 + diff * 0.6;
                let stack = [{ x: W / 2 - 70, w: 140 }];
                let cur = { x: 0, w: 140, dir: 1 };
                let placed = 1, ended = false;
                api.setDots(goal);

                function topY(level) { return H - 30 - level * blockH; }

                function drop() {
                    if (ended) return;
                    const below = stack[stack.length - 1];
                    const left = Math.max(cur.x, below.x);
                    const right = Math.min(cur.x + cur.w, below.x + below.w);
                    const overlap = right - left;
                    if (overlap <= 4) { fail(); return; }
                    stack.push({ x: left, w: overlap });
                    placed++;
                    api.sfx('latch'); placed++;
                    api.setDots(goal, Array.from({ length: goal }, (_, i) => i < placed ? 'done' : ''));
                    if (placed >= goal) { win(); return; }
                    cur = { x: 0, w: overlap, dir: 1 };
                    speed += 0.15;
                }
                function key(e) { if (e.code === 'Space') { e.preventDefault(); drop(); } }
                document.addEventListener('keydown', key);
                cvs.addEventListener('click', drop);

                function win() { if (ended) return; ended = true; cleanup(); api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                function fail() { if (ended) return; ended = true; api.shake(); cleanup(); api.stopTimer(); setTimeout(() => api.fail(), 200); }
                function cleanup() { document.removeEventListener('keydown', key); }

                api.setTag('STACK');
                api.startTimer(Math.max(12, 26 - diff * 2), () => fail());

                function draw() {
                    if (!ended) {
                        cur.x += cur.dir * speed;
                        if (cur.x + cur.w > W) { cur.x = W - cur.w; cur.dir = -1; }
                        if (cur.x < 0) { cur.x = 0; cur.dir = 1; }
                    }
                    ctx.clearRect(0, 0, W, H);
                    const acc = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8').trim();
                    const suc = (getComputedStyle(document.documentElement).getPropertyValue('--success') || '#39d98a').trim();
                    stack.forEach((b, i) => {
                        ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.15)' : acc;
                        ctx.globalAlpha = i === 0 ? 1 : 0.55 + (i / stack.length) * 0.45;
                        ctx.fillRect(b.x, topY(i), b.w, blockH - 2);
                        ctx.globalAlpha = 1;
                    });
                    const y = topY(stack.length);
                    ctx.fillStyle = suc; ctx.shadowColor = suc; ctx.shadowBlur = 12;
                    ctx.fillRect(cur.x, y, cur.w, blockH - 2); ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.setLineDash([4, 4]);
                    const gy = topY(goal);
                    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); ctx.setLineDash([]);
                    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px monospace'; ctx.textAlign = 'left';
                    ctx.fillText('goal', 6, gy - 4);
                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); cleanup(); } };
            }
        });
    </script>
    <script>MG.register('targets', {
            title: 'Targets',
            hint: 'Click the targets · avoid the red ones',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const need = 6 + diff * 2;
                const maxMiss = Math.max(2, 5 - diff);
                const life = Math.max(750, 1900 - diff * 210);
                const spawnGap = Math.max(380, 950 - diff * 110);
                const decoyChance = 0.12 + diff * 0.05;
                const W = 460, H = 300;

                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'crosshair';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                let targets = [], hits = 0, miss = 0, ended = false, lastSpawn = 0;
                api.setDots(maxMiss);

                function spawn() {
                    const decoy = Math.random() < decoyChance;
                    targets.push({
                        x: api.rand(40, W - 40), y: api.rand(40, H - 40),
                        born: performance.now(), decoy, dead: false
                    });
                }
                function rel(e) {
                    const b = cvs.getBoundingClientRect();
                    return {
                        x: (e.clientX - b.left) * (cvs.width / b.width),
                        y: (e.clientY - b.top) * (cvs.height / b.height)
                    };
                }
                cvs.addEventListener('click', (e) => {
                    if (ended) return;
                    const p = rel(e);
                    for (const t of targets) {
                        if (t.dead) continue;
                        const age = performance.now() - t.born;
                        const r = 22 * (1 - age / life) + 6;
                        if (Math.hypot(t.x - p.x, t.y - p.y) < r + 4) {
                            t.dead = true;
                            if (t.decoy) { registerMiss(); }
                            else { hits++; api.sfx('select'); if (hits >= need) win(); }
                            return;
                        }
                    }
                });
                function registerMiss() {
                    miss++;
                    api.setDots(maxMiss, Array.from({ length: maxMiss }, (_, i) => i < miss ? 'fail' : ''));
                    if (miss >= maxMiss) fail();
                }
                function win() { if (ended) return; ended = true; api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                function fail() { if (ended) return; ended = true; api.shake(); api.stopTimer(); setTimeout(() => api.fail(), 200); }

                api.setTag('0/' + need);
                api.startTimer(Math.max(14, 28 - diff * 2), () => fail());

                function draw() {
                    const now = performance.now();
                    if (!ended && now - lastSpawn > spawnGap) { spawn(); lastSpawn = now; }
                    ctx.clearRect(0, 0, W, H);
                    const acc = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8').trim();
                    const dng = (getComputedStyle(document.documentElement).getPropertyValue('--danger') || '#ff3b5c').trim();

                    targets.forEach((t) => {
                        if (t.dead) return;
                        const age = now - t.born;
                        if (age > life) { t.dead = true; if (!t.decoy) registerMiss(); return; }
                        const r = 22 * (1 - age / life) + 6;
                        ctx.strokeStyle = t.decoy ? dng : acc; ctx.lineWidth = 3;
                        ctx.fillStyle = t.decoy ? 'rgba(255,59,92,0.12)' : 'rgba(0,224,184,0.12)';
                        ctx.shadowColor = t.decoy ? dng : acc; ctx.shadowBlur = 10;
                        ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                        ctx.beginPath(); ctx.arc(t.x, t.y, r * 0.4, 0, Math.PI * 2); ctx.stroke();
                        ctx.shadowBlur = 0;
                    });
                    targets = targets.filter((t) => !t.dead);
                    api.setTag(hits + '/' + need);
                    if (!ended) loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); } };
            }
        });
    </script>
    <script>MG.register('livewire', {
            title: 'Live Wire',
            hint: 'Drag each wire to its matching color',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const pairs = 3 + Math.floor(diff / 2);
                const time = Math.max(8, 22 - diff * 2.5);

                const colors = ['#ff4d6d', '#ffd23f', '#00e0b8', '#5b8cff', '#c06bff', '#ff8a00'];
                const W = 480, H = 300, pad = 40;

                const wrap = document.createElement('div');
                wrap.style.cssText = `position:relative;width:${W}px;height:${H}px;`;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cssText = 'position:absolute;inset:0;';
                wrap.appendChild(cvs);
                api.board.appendChild(wrap);
                const ctx = cvs.getContext('2d');

                const order = [...Array(pairs).keys()];
                const rightOrder = order.slice().sort(() => Math.random() - 0.5);
                const gap = (H - pad * 2) / (pairs - 1 || 1);
                const left = order.map((i) => ({ x: pad, y: pad + i * gap, c: colors[i], done: false }));
                const right = rightOrder.map((cIdx, i) => ({ x: W - pad, y: pad + i * gap, c: colors[cIdx], idx: cIdx }));

                let dragFrom = null, mouse = { x: 0, y: 0 }, solved = 0;
                const links = [];

                api.startTimer(time, () => api.fail());

                function nodeAt(x, y, arr, r = 16) {
                    return arr.find((n) => Math.hypot(n.x - x, n.y - y) < r);
                }

                cvs.addEventListener('mousedown', (e) => {
                    const { x, y } = rel(e);
                    const n = nodeAt(x, y, left);
                    if (n && !n.done) dragFrom = n;
                });
                cvs.addEventListener('mousemove', (e) => { mouse = rel(e); });
                cvs.addEventListener('mouseup', (e) => {
                    if (!dragFrom) return;
                    const { x, y } = rel(e);
                    const t = nodeAt(x, y, right);
                    if (t && t.c === dragFrom.c) {
                        dragFrom.done = true;
                        links.push({ a: dragFrom, b: t, c: dragFrom.c });
                        solved++;
                        if (solved >= pairs) { api.stopTimer(); setTimeout(() => api.succeed(), 250); }
                    } else if (t) {
                        api.shake();
                        api.stopTimer();
                        setTimeout(() => api.fail(), 200);
                    }
                    dragFrom = null;
                });

                    const sx = cvs.width / b.width;
                    const sy = cvs.height / b.height;

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    links.forEach((l) => wire(l.a.x, l.a.y, l.b.x, l.b.y, l.c, 4));
                    if (dragFrom) wire(dragFrom.x, dragFrom.y, mouse.x, mouse.y, dragFrom.c, 3);
                    left.forEach((n) => port(n.x, n.y, n.c, n.done));
                    right.forEach((n) => port(n.x, n.y, n.c, false));

                    ctx.shadowColor = c; ctx.shadowBlur = 8;

                function port(x, y, c, done) {

                    ctx.strokeStyle = c; ctx.lineWidth = 3;
                    ctx.shadowColor = c; ctx.shadowBlur = done ? 14 : 6;

                    ctx.shadowBlur = 0;

                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); } };
            }
        });

    <script>MG.register('flatline', {
            title: 'Flatline',
            hint: 'SPACE inside the green zone',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const need = api.cfg.rounds || 3;
                const W = 480, H = 240;

                const wrap = document.createElement('div');
                wrap.style.cssText = `width:${W}px;`;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                wrap.appendChild(cvs);
                api.board.appendChild(wrap);
                const ctx = cvs.getContext('2d');

                let done = 0, fails = 0, pos = 0, dir = 1;
                const speed = 1.7 + diff * 0.95;
                const zoneW = Math.max(38, 120 - diff * 14);
                let zoneX = rnd();
                api.setDots(need);

                function rnd() { return 60 + Math.random() * (W - 120 - zoneW); }

                function attempt() {
                    const center = zoneX + zoneW / 2;
                    const hit = pos >= zoneX && pos <= zoneX + zoneW;
                    if (hit) {
                        done++;
                        api.setDots(need, fillStates());
                        if (done >= need) { api.stopTimer(); cleanupKeys(); setTimeout(() => api.succeed(), 250); return; }
                        zoneX = rnd();
                    } else {
                        fails++;
                        api.shake();
                        api.setDots(need, fillStates(true));
                        if (fails >= 2) { api.stopTimer(); cleanupKeys(); setTimeout(() => api.fail(), 250); return; }
                        zoneX = rnd();
                    }
                }
                function fillStates(markFail) {
                    const s = [];
                    for (let i = 0; i < need; i++) s[i] = i < done ? 'done' : '';
                    return s;
                }

                function key(e) {
                    if (e.code === 'Space') { e.preventDefault(); attempt(); }
                }
                document.addEventListener('keydown', key);
                function cleanupKeys() { document.removeEventListener('keydown', key); }

                api.startTimer(Math.max(8, 20 - diff * 1.6), () => { cleanupKeys(); api.fail(); });

                function ecg(x) {
                    const baseline = H * 0.6;
                    const t = (x / W) * Math.PI * 8;
                    let y = Math.sin(t) * 3;
                    const beat = (x % 120);
                    if (beat > 40 && beat < 60) y -= Math.sin((beat - 40) / 20 * Math.PI) * 55;
                    return baseline + y;
                }

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    ctx.strokeStyle = 'rgba(57,217,138,0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let x = 0; x <= W; x += 2) { const y = ecg(x); x ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(57,217,138,0.16)';
                    ctx.strokeStyle = '#39d98a'; ctx.lineWidth = 2;
                    ctx.fillRect(zoneX, 30, zoneW, H - 60);
                    ctx.strokeRect(zoneX, 30, zoneW, H - 60);

                    pos += dir * speed;
                    if (pos > W - 40) { pos = W - 40; dir = -1; }
                    if (pos < 40) { pos = 40; dir = 1; }
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
                    ctx.beginPath(); ctx.moveTo(pos, 24); ctx.lineTo(pos, H - 24); ctx.stroke();
                    ctx.shadowBlur = 0;

                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); cleanupKeys(); } };
            }
        });
    </script>
    <script>MG.register('deadcalm', {
            title: 'Dead Calm',
            hint: 'Hold SPACE to steady · CLICK to fire',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const need = api.cfg.shots || 3;
                const W = 420, H = 300;

                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                const targetR = Math.max(22, 50 - diff * 6);
                const drift = 0.9 + diff * 0.45;
                let tx = W / 2, ty = H / 2;
                let cx = W / 2, cy = H / 2;
                let phase = Math.random() * 100;
                let holding = false, breath = 1, shots = 0;
                let tvx = api.rand(-0.4, 0.4), tvy = api.rand(-0.4, 0.4);

                api.setDots(need);
                api.startTimer(Math.max(11, 24 - diff * 1.8), () => { unbind(); api.fail(); });

                function down(e) { if (e.code === 'Space') { e.preventDefault(); holding = true; } }
                function up(e) { if (e.code === 'Space') { e.preventDefault(); holding = false; } }
                function fire() {
                    const inside = Math.hypot(cx - tx, cy - ty) < targetR * 0.6;
                    if (inside) {
                        shots++;
                        const st = []; for (let i = 0; i < need; i++) st[i] = i < shots ? 'done' : '';
                        api.setDots(need, st);
                        if (shots >= need) { api.stopTimer(); unbind(); setTimeout(() => api.succeed(), 250); return; }
                        tx = api.rand(80, W - 80); ty = api.rand(80, H - 80);
                    } else {
                        api.shake(); api.stopTimer(); unbind();
                        setTimeout(() => api.fail(), 200);
                    }
                }
                document.addEventListener('keydown', down);
                document.addEventListener('keyup', up);
                cvs.addEventListener('click', fire);
                function unbind() {
                    document.removeEventListener('keydown', down);
                    document.removeEventListener('keyup', up);
                }

                function draw() {
                    phase += 0.05;
                    if (holding) breath = Math.max(0, breath - 0.012);
                    else breath = Math.min(1, breath + 0.006);

                    const steady = holding && breath > 0;
                    const amp = steady ? drift * 1.2 : drift * (breath <= 0 ? 9 : 5.5);
                    const wob = amp;
                    cx = tx + Math.sin(phase * 1.7) * wob + Math.sin(phase * 0.6) * wob * 0.6;
                    cy = ty + Math.cos(phase * 1.3) * wob + Math.cos(phase * 0.9) * wob * 0.6;

                    tx += tvx; ty += tvy;
                    if (tx < 70 || tx > W - 70) tvx *= -1;
                    if (ty < 70 || ty > H - 70) tvy *= -1;

                    ctx.clearRect(0, 0, W, H);
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
                    for (let i = 0; i < W; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
                    for (let j = 0; j < H; j += 30) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(W, j); ctx.stroke(); }

                    ctx.strokeStyle = (getComputedStyle(document.documentElement).getPropertyValue('--danger') || '#ff3b5c').trim();
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(tx, ty, targetR, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(tx, ty, targetR * 0.6, 0, Math.PI * 2);
                    ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);

                    const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8';
                    ctx.strokeStyle = acc; ctx.lineWidth = 2;
                    ctx.shadowColor = acc; ctx.shadowBlur = steady ? 12 : 0;
                    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx - 18, cy); ctx.lineTo(cx - 4, cy);
                    ctx.moveTo(cx + 4, cy); ctx.lineTo(cx + 18, cy);
                    ctx.moveTo(cx, cy - 18); ctx.lineTo(cx, cy - 4);
                    ctx.moveTo(cx, cy + 4); ctx.lineTo(cx, cy + 18);
                    ctx.stroke(); ctx.shadowBlur = 0;

                    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(20, H - 16, W - 40, 6);
                    ctx.fillStyle = breath > 0.25 ? acc : '#ff3b5c';
                    ctx.fillRect(20, H - 16, (W - 40) * breath, 6);

                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); unbind(); } };
            }
        });
    </script>
    <script>MG.register('ghostsignal', {
            title: 'Ghost Signal',
            hint: '↑↓ frequency · ←→ phase · lock to match',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const W = 480, H = 240;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');

                const tol = Math.max(0.04, 0.16 - diff * 0.022);
                const noise = 4 + diff * 3;
                const targetF = api.rand(0.6, 2.2);
                const targetP = api.rand(0, Math.PI * 2);
                let f = api.rand(0.6, 2.2), p = api.rand(0, Math.PI * 2);
                let lockT = 0;
                const needLock = 55;

                api.startTimer(Math.max(12, 24 - diff * 2), () => { unbind(); api.fail(); });

                function key(e) {
                    if (e.code === 'ArrowUp') { f += 0.04; e.preventDefault(); }
                    if (e.code === 'ArrowDown') { f -= 0.04; e.preventDefault(); }
                    if (e.code === 'ArrowLeft') { p -= 0.12; e.preventDefault(); }
                    if (e.code === 'ArrowRight') { p += 0.12; e.preventDefault(); }
                    f = Math.max(0.4, Math.min(2.6, f));
                }
                document.addEventListener('keydown', key);
                function unbind() { document.removeEventListener('keydown', key); }

                function wave(fr, ph, amp, color, glow) {
                    ctx.strokeStyle = color; ctx.lineWidth = 2;
                    ctx.shadowColor = glow ? color : 'transparent'; ctx.shadowBlur = glow ? 10 : 0;
                    ctx.beginPath();
                    for (let x = 0; x <= W; x += 2) {
                        const t = (x / W) * Math.PI * 6;
                        const y = H / 2 - Math.sin(t * fr + ph) * amp
                            + (glow ? 0 : (Math.random() - 0.5) * noise);
                        x ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
                    }
                    ctx.stroke(); ctx.shadowBlur = 0;
                }

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    wave(targetF, targetP, 60, 'rgba(255,255,255,0.22)', false);
                    const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8';
                    wave(f, p, 60, acc, true);

                    const df = Math.abs(f - targetF);
                    let dp = Math.abs(((p - targetP) % (Math.PI * 2)));
                    dp = Math.min(dp, Math.PI * 2 - dp) / Math.PI;
                    const locked = df < tol && dp < tol;

                    if (locked) { lockT++; api.setTag('LOCKING ' + Math.round(lockT / needLock * 100) + '%'); }
                    else { lockT = Math.max(0, lockT - 2); api.setTag('SCANNING'); }

                    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(20, H - 14, W - 40, 6);
                    ctx.fillStyle = acc; ctx.fillRect(20, H - 14, (W - 40) * (lockT / needLock), 6);

                    if (lockT >= needLock) { api.stopTimer(); unbind(); setTimeout(() => api.succeed(), 200); return; }
                    loop = requestAnimationFrame(draw);
                }
                let loop = requestAnimationFrame(draw);
                return { destroy() { cancelAnimationFrame(loop); unbind(); } };
            }
        });
    </script>
    <script>MG.register('steadydose', {
            title: 'Steady Dose',

                let zoneY = H / 2, zdir = 1, phase = 0;
                let needle = H / 2, fill = 0;

                api.startTimer(Math.max(10, 20 - diff), () => { unbind(); api.fail(); });

                function move(e) {
                    const b = cvs.getBoundingClientRect();

                    if (fill >= 100) { api.stopTimer(); unbind(); setTimeout(() => api.succeed(), 200); return; }

                    ctx.fillRect(trackX, zoneY - zoneH / 2, 60, zoneH);
                    ctx.strokeRect(trackX, zoneY - zoneH / 2, 60, zoneH);
                    ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.moveTo(trackX - 14, nY); ctx.lineTo(trackX - 2, nY - 8); ctx.lineTo(trackX - 2, nY + 8);

            }

    <script>MG.register('vaultspin', {
            title: 'Vault Spin',
            hint: 'Drag the dial to each lit number',
            run(api) {
                const diff = Math.max(1, Math.min(5, api.cfg.difficulty || 2));
                const tumblers = api.cfg.tumblers || (2 + Math.floor(diff / 2));
                const tol = Math.max(4, 12 - diff * 1.6);
                const segments = 40;

                const W = 320, H = 300;
                const cvs = document.createElement('canvas');
                cvs.width = W; cvs.height = H;
                cvs.style.cursor = 'grab';
                api.board.appendChild(cvs);
                const ctx = cvs.getContext('2d');
                const cxp = W / 2, cyp = H / 2, R = 110;

                const targets = [];
                for (let i = 0; i < tumblers; i++) targets.push(api.randInt(0, segments - 1));
                let step = 0, angle = 0, dragging = false, lastA = 0;
                api.setDots(tumblers);

                function numToAngle(n) { return (n / segments) * Math.PI * 2 - Math.PI / 2; }
                function angleToNum(a) {
                    let deg = ((a + Math.PI / 2) % (Math.PI * 2));
                    if (deg < 0) deg += Math.PI * 2;
                    return Math.round(deg / (Math.PI * 2) * segments) % segments;
                }
                function pointerAngle(e) {
                    const b = cvs.getBoundingClientRect();
                    const sx = cvs.width / b.width;
                    const sy = cvs.height / b.height;
                    const px = (e.clientX - b.left) * sx;
                    const py = (e.clientY - b.top) * sy;
                    return Math.atan2(py - cyp, px - cxp);
                }

                cvs.addEventListener('mousedown', (e) => { dragging = true; lastA = pointerAngle(e); cvs.style.cursor = 'grabbing'; });
                window.addEventListener('mouseup', upH);
                cvs.addEventListener('mousemove', (e) => {
                    if (!dragging) return;
                    const a = pointerAngle(e);
                    let d = a - lastA;
                    if (d > Math.PI) d -= Math.PI * 2;
                    if (d < -Math.PI) d += Math.PI * 2;
                    angle += d; lastA = a;
                });
                function upH() {
                    if (!dragging) return;
                    dragging = false; cvs.style.cursor = 'grab';
                    const cur = angleToNum(angle);
                    if (cur === targets[step]) {
                        step++;
                        const st = []; for (let i = 0; i < tumblers; i++) st[i] = i < step ? 'done' : (i === step ? 'active' : '');
                        api.setDots(tumblers, st);
                        if (step >= tumblers) { api.stopTimer(); cleanup(); setTimeout(() => api.succeed(), 250); }
                    }
                }
                function cleanup() { window.removeEventListener('mouseup', upH); }

                api.startTimer(Math.max(12, 26 - diff * 2), () => { cleanup(); api.fail(); });

                function draw() {
                    ctx.clearRect(0, 0, W, H);
                    const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#00e0b8';
                    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(cxp, cyp, R + 14, 0, Math.PI * 2); ctx.stroke();
                    for (let i = 0; i < segments; i++) {
                        const a = numToAngle(i);
                        const big = i % 5 === 0;
                        const r1 = R + 10, r2 = R + (big ? -2 : 3);
                        ctx.strokeStyle = i === targets[step] ? acc : 'rgba(255,255,255,0.25)';
                        ctx.lineWidth = big ? 2 : 1;
                        ctx.beginPath();
                        ctx.moveTo(cxp + Math.cos(a) * r1, cyp + Math.sin(a) * r1);
                        ctx.lineTo(cxp + Math.cos(a) * r2, cyp + Math.sin(a) * r2);
                        ctx.stroke();
                        if (big) {
                            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '10px monospace';
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText(i, cxp + Math.cos(a) * (R - 14), cyp + Math.sin(a) * (R - 14));
                        }
                    }
                    const g = ctx.createRadialGradient(cxp, cyp, 10, cxp, cyp, R);
                    g.addColorStop(0, '#1a2230'); g.addColorStop(1, '#0a0e14');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cxp, cyp, R, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = acc; ctx.lineWidth = 2; ctx.stroke();
                    ctx.save(); ctx.translate(cxp, cyp); ctx.rotate(angle);
                    ctx.fillStyle = acc; ctx.shadowColor = acc; ctx.shadowBlur = 10;
                    ctx.fillRect(-3, -R + 6, 6, 30);
                    ctx.restore(); ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.moveTo(cxp, cyp - R - 18); ctx.lineTo(cxp - 7, cyp - R - 30); ctx.lineTo(cxp + 7, cyp - R - 30); ctx.fill();

                    ctx.fillText(angleToNum(angle), cxp, cyp);
